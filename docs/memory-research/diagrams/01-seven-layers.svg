<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="coveredGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="notCoveredGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">Agent 数据七层模型 — 两个独立产品各自覆盖不同的层</text>

  <!-- Layer rows -->
  <!-- Layer 1: Knowledge -->
  <rect x="40" y="56" width="720" height="56" rx="8" fill="url(#coveredGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="72" cy="84" r="16" fill="#3b82f6"/>
  <text x="72" y="89" text-anchor="middle" font-size="14" font-weight="700" fill="white">1</text>
  <text x="100" y="80" font-size="15" font-weight="600" fill="#1e40af">知识 Knowledge</text>
  <text x="100" y="98" font-size="12" fill="#475569">文档→知识库→RAG + Agentic Search</text>
  <rect x="540" y="68" width="100" height="24" rx="4" fill="#3b82f6" opacity="0.15"/>
  <text x="590" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">ZhiXing</text>
  <rect x="648" y="68" width="100" height="24" rx="4" fill="#8b5cf6" opacity="0.15"/>
  <text x="698" y="85" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">dbay.cloud</text>

  <!-- Layer 2: Memory -->
  <rect x="40" y="120" width="720" height="56" rx="8" fill="url(#coveredGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="72" cy="148" r="16" fill="#3b82f6"/>
  <text x="72" y="153" text-anchor="middle" font-size="14" font-weight="700" fill="white">2</text>
  <text x="100" y="144" font-size="15" font-weight="600" fill="#1e40af">记忆 Memory</text>
  <text x="100" y="162" font-size="12" fill="#475569">对话提取、Trait 反思、Q-value、跨 Agent 同步</text>
  <rect x="540" y="132" width="100" height="24" rx="4" fill="#3b82f6" opacity="0.15"/>
  <text x="590" y="149" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">ZhiXing</text>
  <rect x="648" y="132" width="100" height="24" rx="4" fill="#8b5cf6" opacity="0.15"/>
  <text x="698" y="149" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">dbay.cloud</text>

  <!-- Layer 3: Conversation History (not covered) -->
  <rect x="40" y="184" width="720" height="56" rx="8" fill="url(#notCoveredGrad)" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="72" cy="212" r="16" fill="#94a3b8"/>
  <text x="72" y="217" text-anchor="middle" font-size="14" font-weight="700" fill="white">3</text>
  <text x="100" y="208" font-size="15" font-weight="600" fill="#64748b">对话历史 Conversation History</text>
  <text x="100" y="226" font-size="12" fill="#94a3b8">Agent 平台原生管理</text>
  <rect x="620" y="196" width="128" height="24" rx="4" fill="#f1f5f9"/>
  <text x="684" y="213" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">不做 — Agent 原生</text>

  <!-- Layer 4: Context Assembly (not covered) -->
  <rect x="40" y="248" width="720" height="56" rx="8" fill="url(#notCoveredGrad)" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,4"/>
  <circle cx="72" cy="276" r="16" fill="#94a3b8"/>
  <text x="72" y="281" text-anchor="middle" font-size="14" font-weight="700" fill="white">4</text>
  <text x="100" y="272" font-size="15" font-weight="600" fill="#64748b">上下文组装 Context Assembly</text>
  <text x="100" y="290" font-size="12" fill="#94a3b8">Agent 平台 ContextEngine</text>
  <rect x="620" y="260" width="128" height="24" rx="4" fill="#f1f5f9"/>
  <text x="684" y="277" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8">不做 — Agent 原生</text>

  <!-- Layer 5: Trajectory / Flywheel -->
  <rect x="40" y="312" width="720" height="56" rx="8" fill="url(#coveredGrad)" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="72" cy="340" r="16" fill="#3b82f6"/>
  <text x="72" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="white">5</text>
  <text x="100" y="336" font-size="15" font-weight="600" fill="#1e40af">轨迹/飞轮 Trajectory</text>
  <text x="100" y="354" font-size="12" fill="#475569">Q-value 闭环 + 平台模型 + 训练数据导出</text>
  <rect x="540" y="324" width="100" height="24" rx="4" fill="#3b82f6" opacity="0.15"/>
  <text x="590" y="341" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">ZhiXing</text>
  <rect x="648" y="324" width="100" height="24" rx="4" fill="#8b5cf6" opacity="0.15"/>
  <text x="698" y="341" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">dbay.cloud</text>

  <!-- Layer 6: Runtime Environment -->
  <rect x="40" y="376" width="720" height="56" rx="8" fill="url(#coveredGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="72" cy="404" r="16" fill="#8b5cf6"/>
  <text x="72" y="409" text-anchor="middle" font-size="14" font-weight="700" fill="white">6</text>
  <text x="100" y="400" font-size="15" font-weight="600" fill="#5b21b6">运行环境 Environment</text>
  <text x="100" y="418" font-size="12" fill="#475569">秒级建库、scale-to-zero、Neon 替代</text>
  <rect x="648" y="388" width="100" height="24" rx="4" fill="#8b5cf6" opacity="0.15"/>
  <text x="698" y="405" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">dbay.cloud</text>

  <!-- Layer 7: Working State -->
  <rect x="40" y="440" width="720" height="56" rx="8" fill="url(#coveredGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="72" cy="468" r="16" fill="#8b5cf6"/>
  <text x="72" y="473" text-anchor="middle" font-size="14" font-weight="700" fill="white">7</text>
  <text x="100" y="464" font-size="15" font-weight="600" fill="#5b21b6">工作状态 State</text>
  <text x="100" y="482" font-size="12" fill="#475569">分支试错、检查点回滚</text>
  <rect x="648" y="452" width="100" height="24" rx="4" fill="#8b5cf6" opacity="0.15"/>
  <text x="698" y="469" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">dbay.cloud</text>
</svg>
