<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadowFw" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">数据飞轮 — 让 ZhiXing 自己越用越强</text>

  <!-- Center circle -->
  <circle cx="360" cy="300" r="60" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="360" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">数据飞轮</text>
  <text x="360" y="310" text-anchor="middle" font-size="11" fill="#3b82f6">越用越强</text>

  <!-- Node 1: Runtime (top) -->
  <rect x="230" y="60" width="260" height="80" rx="12" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadowFw)"/>
  <circle cx="260" cy="84" r="14" fill="#3b82f6"/>
  <text x="260" y="89" text-anchor="middle" font-size="12" font-weight="700" fill="white">1</text>
  <text x="360" y="84" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">ZhiXing 运行时</text>
  <text x="360" y="104" text-anchor="middle" font-size="11" fill="#64748b">recall() · ingest() · digest()</text>
  <text x="360" y="120" text-anchor="middle" font-size="10" fill="#94a3b8">每次调用自动产生训练数据</text>

  <!-- Node 2: Data Lake (right) -->
  <rect x="490" y="210" width="200" height="80" rx="12" fill="white" stroke="#7c3aed" stroke-width="2" filter="url(#shadowFw)"/>
  <circle cx="520" cy="234" r="14" fill="#7c3aed"/>
  <text x="520" y="239" text-anchor="middle" font-size="12" font-weight="700" fill="white">2</text>
  <text x="590" y="238" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">dbay 数据湖</text>
  <text x="590" y="258" text-anchor="middle" font-size="11" fill="#64748b">PG → OBS → Lance</text>
  <text x="590" y="274" text-anchor="middle" font-size="10" fill="#94a3b8">格式化为训练数据集</text>

  <!-- Node 3: Training (bottom-right) -->
  <rect x="460" y="390" width="220" height="80" rx="12" fill="white" stroke="#7c3aed" stroke-width="2" filter="url(#shadowFw)"/>
  <circle cx="490" cy="414" r="14" fill="#7c3aed"/>
  <text x="490" y="419" text-anchor="middle" font-size="12" font-weight="700" fill="white">3</text>
  <text x="570" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">训练管线</text>
  <text x="570" y="438" text-anchor="middle" font-size="11" fill="#64748b">SFT + DPO + RL (GRPO)</text>
  <text x="570" y="454" text-anchor="middle" font-size="10" fill="#94a3b8">4B-8B 专精小模型</text>

  <!-- Node 4: Model Service (bottom-left) -->
  <rect x="40" y="390" width="220" height="80" rx="12" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadowFw)"/>
  <circle cx="70" cy="414" r="14" fill="#3b82f6"/>
  <text x="70" y="419" text-anchor="middle" font-size="12" font-weight="700" fill="white">4</text>
  <text x="150" y="418" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">专属模型服务</text>
  <text x="150" y="438" text-anchor="middle" font-size="11" fill="#64748b">提取 · 管理 · 排序模型</text>
  <text x="150" y="454" text-anchor="middle" font-size="10" fill="#94a3b8">vLLM Multi-LoRA 部署</text>

  <!-- Node 5: Better Performance (left) -->
  <rect x="30" y="210" width="200" height="80" rx="12" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadowFw)"/>
  <circle cx="60" cy="234" r="14" fill="#3b82f6"/>
  <text x="60" y="239" text-anchor="middle" font-size="12" font-weight="700" fill="white">5</text>
  <text x="130" y="238" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">更好的效果</text>
  <text x="130" y="258" text-anchor="middle" font-size="11" fill="#64748b">提取更准 · 检索更好</text>
  <text x="130" y="274" text-anchor="middle" font-size="10" fill="#94a3b8">→ 更高质量训练数据</text>

  <!-- Arrows: 1→2 -->
  <path d="M 490 110 Q 560 150 540 210" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="540" y="158" font-size="10" fill="#3b82f6" font-weight="500">产生训练数据</text>

  <!-- Arrows: 2→3 -->
  <path d="M 590 290 Q 600 340 580 390" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="618" y="345" font-size="10" fill="#7c3aed" font-weight="500">训练专精模型</text>

  <!-- Arrows: 3→4 -->
  <path d="M 460 430 L 260 430" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="360" y="422" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="500">部署为推理服务</text>

  <!-- Arrows: 4→5 -->
  <path d="M 130 390 Q 110 340 130 290" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="88" y="345" font-size="10" fill="#3b82f6" font-weight="500">替换通用 LLM</text>

  <!-- Arrows: 5→1 -->
  <path d="M 180 210 Q 240 160 260 140" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="180" y="162" font-size="10" fill="#3b82f6" font-weight="500">更好的运行时</text>

  <!-- Bottom note: why hard to copy -->
  <rect x="120" y="510" width="480" height="68" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="360" y="534" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">为什么难以复制？</text>
  <text x="360" y="554" text-anchor="middle" font-size="11" fill="#7f1d1d">竞品没有 Q-value 反馈数据（独有训练信号）</text>
  <text x="360" y="570" text-anchor="middle" font-size="11" fill="#7f1d1d">飞轮越转越快 — 先发者数据优势不断积累</text>
</svg>
