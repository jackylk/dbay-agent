<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadowRm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">产品策略三阶段路线图</text>
  <text x="450" y="52" text-anchor="middle" font-size="12" fill="#94a3b8">从个人助理切入 → 开发者平台 → Agent 数据智能平台</text>

  <!-- Timeline bar -->
  <rect x="60" y="74" width="780" height="6" rx="3" fill="#e2e8f0"/>
  <rect x="60" y="74" width="240" height="6" rx="3" fill="#3b82f6"/>
  <rect x="300" y="74" width="260" height="6" rx="3" fill="#8b5cf6"/>
  <rect x="560" y="74" width="280" height="6" rx="3" fill="#f97316"/>

  <!-- Timeline dots -->
  <circle cx="60" cy="77" r="8" fill="#3b82f6"/>
  <text x="60" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">现在</text>
  <circle cx="300" cy="77" r="8" fill="#3b82f6"/>
  <text x="300" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">2 个月</text>
  <circle cx="560" cy="77" r="8" fill="#8b5cf6"/>
  <text x="560" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#8b5cf6">4 个月</text>
  <circle cx="840" cy="77" r="8" fill="#f97316"/>
  <text x="840" y="100" text-anchor="middle" font-size="10" font-weight="600" fill="#f97316">6 个月</text>

  <!-- Phase 1 -->
  <rect x="30" y="115" width="270" height="385" rx="14" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadowRm)"/>
  <rect x="30" y="115" width="270" height="44" rx="14" fill="#eff6ff"/>
  <rect x="30" y="145" width="270" height="2" fill="white"/>
  <text x="165" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">阶段一：个人助理记忆</text>

  <!-- Phase 1: Target -->
  <text x="50" y="172" font-size="11" font-weight="600" fill="#1e40af">目标用户</text>
  <text x="50" y="188" font-size="11" fill="#475569">开发者作为个人用户</text>
  <text x="50" y="204" font-size="11" fill="#475569">Claude Code / Cursor / OpenClaw</text>

  <line x1="50" y1="214" x2="280" y2="214" stroke="#e2e8f0" stroke-width="1"/>

  <text x="50" y="232" font-size="11" font-weight="600" fill="#1e40af">核心任务</text>
  <circle cx="58" cy="248" r="3" fill="#3b82f6"/>
  <text x="68" y="252" font-size="11" fill="#475569">Q-value 飞轮 + A/B 验证</text>
  <circle cx="58" cy="268" r="3" fill="#3b82f6"/>
  <text x="68" y="272" font-size="11" fill="#475569">L0/L1/L2 分层加载</text>
  <circle cx="58" cy="288" r="3" fill="#3b82f6"/>
  <text x="68" y="292" font-size="11" fill="#475569">跨 Space 记忆查询</text>
  <circle cx="58" cy="308" r="3" fill="#3b82f6"/>
  <text x="68" y="312" font-size="11" fill="#475569">LongMemEval 测试</text>

  <line x1="50" y1="324" x2="280" y2="324" stroke="#e2e8f0" stroke-width="1"/>

  <text x="50" y="342" font-size="11" font-weight="600" fill="#1e40af">打动用户</text>
  <text x="50" y="360" font-size="11" fill="#475569">对话导入 → 即刻画像</text>
  <text x="50" y="376" font-size="11" fill="#475569">跨 Agent 记忆同步</text>
  <text x="50" y="392" font-size="11" fill="#475569">省 80%+ 记忆 token</text>

  <line x1="50" y1="404" x2="280" y2="404" stroke="#e2e8f0" stroke-width="1"/>

  <text x="50" y="422" font-size="11" font-weight="600" fill="#1e40af">关键指标</text>
  <text x="50" y="440" font-size="11" fill="#475569">OpenClaw 占比 &lt; 60%</text>
  <text x="50" y="456" font-size="11" fill="#475569">Q-value 提升 &gt; 5%</text>
  <text x="50" y="472" font-size="11" fill="#475569">SDK 集成开发者 &gt; 10</text>

  <!-- Phase 2 -->
  <rect x="315" y="115" width="270" height="385" rx="14" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadowRm)"/>
  <rect x="315" y="115" width="270" height="44" rx="14" fill="#f5f3ff"/>
  <rect x="315" y="145" width="270" height="2" fill="white"/>
  <text x="450" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">阶段二：开发者生态</text>

  <text x="335" y="172" font-size="11" font-weight="600" fill="#5b21b6">目标用户</text>
  <text x="335" y="188" font-size="11" fill="#475569">AI 应用开发者 / 小型 SaaS</text>
  <text x="335" y="204" font-size="11" fill="#475569">LangChain / LlamaIndex / 自建</text>

  <line x1="335" y1="214" x2="565" y2="214" stroke="#e2e8f0" stroke-width="1"/>

  <text x="335" y="232" font-size="11" font-weight="600" fill="#5b21b6">核心任务</text>
  <circle cx="343" cy="248" r="3" fill="#8b5cf6"/>
  <text x="353" y="252" font-size="11" fill="#475569">知识加工管线 (RAG)</text>
  <circle cx="343" cy="268" r="3" fill="#8b5cf6"/>
  <text x="353" y="272" font-size="11" fill="#475569">三路向量 + Agentic Search</text>
  <circle cx="343" cy="288" r="3" fill="#8b5cf6"/>
  <text x="353" y="292" font-size="11" fill="#475569">训练数据采集 + export()</text>
  <circle cx="343" cy="308" r="3" fill="#8b5cf6"/>
  <text x="353" y="312" font-size="11" fill="#475569">4B mem-agent 概念验证</text>

  <line x1="335" y1="324" x2="565" y2="324" stroke="#e2e8f0" stroke-width="1"/>

  <text x="335" y="342" font-size="11" font-weight="600" fill="#5b21b6">打动用户</text>
  <text x="335" y="360" font-size="11" fill="#475569">5 行代码集成</text>
  <text x="335" y="376" font-size="11" fill="#475569">LoCoMo 82 &gt; Mem0 66.9</text>
  <text x="335" y="392" font-size="11" fill="#475569">Agent-Extract Mode 零额外成本</text>

  <line x1="335" y1="404" x2="565" y2="404" stroke="#e2e8f0" stroke-width="1"/>

  <text x="335" y="422" font-size="11" font-weight="600" fill="#5b21b6">关键技术</text>
  <text x="335" y="440" font-size="11" fill="#475569">A: 知识管线 7 步</text>
  <text x="335" y="456" font-size="11" fill="#475569">B: 飞轮三层落地</text>
  <text x="335" y="472" font-size="11" fill="#475569">PG → OBS → Lance 转换</text>

  <!-- Phase 3 -->
  <rect x="600" y="115" width="270" height="385" rx="14" fill="white" stroke="#f97316" stroke-width="2" filter="url(#shadowRm)"/>
  <rect x="600" y="115" width="270" height="44" rx="14" fill="#fff7ed"/>
  <rect x="600" y="145" width="270" height="2" fill="white"/>
  <text x="735" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#c2410c">阶段三：企业 Agent</text>

  <text x="620" y="172" font-size="11" font-weight="600" fill="#c2410c">目标用户</text>
  <text x="620" y="188" font-size="11" fill="#475569">企业客户 / Agent 平台方</text>
  <text x="620" y="204" font-size="11" fill="#475569">OpenJiuWen / 垂直行业</text>

  <line x1="620" y1="214" x2="850" y2="214" stroke="#e2e8f0" stroke-width="1"/>

  <text x="620" y="232" font-size="11" font-weight="600" fill="#c2410c">核心任务</text>
  <circle cx="628" cy="248" r="3" fill="#f97316"/>
  <text x="638" y="252" font-size="11" fill="#475569">平台 base model 训练</text>
  <circle cx="628" cy="268" r="3" fill="#f97316"/>
  <text x="638" y="272" font-size="11" fill="#475569">Per-tenant LoRA</text>
  <circle cx="628" cy="288" r="3" fill="#f97316"/>
  <text x="638" y="292" font-size="11" fill="#475569">Git 式时序图</text>
  <circle cx="628" cy="308" r="3" fill="#f97316"/>
  <text x="638" y="312" font-size="11" fill="#475569">Ray 集群部署</text>

  <line x1="620" y1="324" x2="850" y2="324" stroke="#e2e8f0" stroke-width="1"/>

  <text x="620" y="342" font-size="11" font-weight="600" fill="#c2410c">打动用户</text>
  <text x="620" y="360" font-size="11" fill="#475569">数据合规（中国部署）</text>
  <text x="620" y="376" font-size="11" fill="#475569">飞轮效果可视化</text>
  <text x="620" y="392" font-size="11" fill="#475569">审计 + SLA + 合规</text>

  <line x1="620" y1="404" x2="850" y2="404" stroke="#e2e8f0" stroke-width="1"/>

  <text x="620" y="422" font-size="11" font-weight="600" fill="#c2410c">关键技术</text>
  <text x="620" y="440" font-size="11" fill="#475569">C: Git 式时序图</text>
  <text x="620" y="456" font-size="11" fill="#475569">D: 训练管线 SFT+DPO+RL</text>
  <text x="620" y="472" font-size="11" fill="#475569">vLLM Multi-LoRA 部署</text>
</svg>
