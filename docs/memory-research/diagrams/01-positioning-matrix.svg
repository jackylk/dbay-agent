<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shP" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">底层存储技术定位矩阵</text>

  <!-- Axes -->
  <line x1="100" y1="60" x2="100" y2="380" stroke="#1e293b" stroke-width="2"/>
  <line x1="100" y1="380" x2="650" y2="380" stroke="#1e293b" stroke-width="2"/>

  <!-- X axis label -->
  <text x="370" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">记忆量小 ←───────────────────────────→ 记忆量大</text>

  <!-- Y axis label -->
  <text x="40" y="220" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b" transform="rotate(-90,40,220)">不需要时序 ←──────→ 需要时序</text>

  <!-- Quadrant backgrounds -->
  <rect x="102" y="62" width="272" height="156" fill="#f8fafc"/>
  <rect x="376" y="62" width="272" height="156" fill="#f5f3ff" opacity="0.5"/>
  <rect x="102" y="220" width="272" height="158" fill="#f0fdf4" opacity="0.5"/>
  <rect x="376" y="220" width="272" height="158" fill="#eff6ff" opacity="0.5"/>

  <!-- Dividers -->
  <line x1="374" y1="62" x2="374" y2="378" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="102" y1="218" x2="648" y2="218" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Q1: Small + No temporal = Markdown -->
  <rect x="140" y="260" width="190" height="80" rx="10" fill="white" stroke="#86efac" stroke-width="1.5" filter="url(#shP)"/>
  <text x="235" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Markdown 文件</text>
  <text x="235" y="304" text-anchor="middle" font-size="11" fill="#475569">Claude Code, OpenClaw 原生</text>
  <text x="235" y="322" text-anchor="middle" font-size="10" fill="#94a3b8">最简单，够用</text>

  <!-- Q2: Large + No temporal = Vector DB -->
  <rect x="414" y="260" width="190" height="80" rx="10" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shP)"/>
  <text x="509" y="284" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">向量数据库</text>
  <text x="509" y="304" text-anchor="middle" font-size="11" fill="#475569">pgvector, sqlite-vec</text>
  <text x="509" y="322" text-anchor="middle" font-size="10" fill="#94a3b8">语义检索</text>

  <!-- Q3: Small + Temporal = LLM Driven -->
  <rect x="140" y="100" width="190" height="80" rx="10" fill="white" stroke="#f59e0b" stroke-width="1.5" filter="url(#shP)"/>
  <text x="235" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">LLM 驱动</text>
  <text x="235" y="144" text-anchor="middle" font-size="11" fill="#475569">Google Always-On</text>
  <text x="235" y="162" text-anchor="middle" font-size="10" fill="#94a3b8">能力强但不可控/贵</text>

  <!-- Q4: Large + Temporal = Temporal Graph -->
  <rect x="414" y="100" width="190" height="80" rx="10" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shP)"/>
  <text x="509" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">时序图</text>
  <text x="509" y="144" text-anchor="middle" font-size="11" fill="#475569">HydraDB, Zep</text>
  <text x="509" y="162" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="500">最强记忆能力</text>
</svg>
