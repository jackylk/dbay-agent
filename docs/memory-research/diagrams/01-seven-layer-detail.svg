<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shL" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">Agent 数据七层模型</text>

  <!-- Layer 1 -->
  <rect x="40" y="46" width="740" height="56" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shL)"/>
  <rect x="40" y="46" width="40" height="56" rx="8" fill="#3b82f6"/>
  <rect x="68" y="46" width="2" height="56" fill="white"/>
  <text x="60" y="80" text-anchor="middle" font-size="16" font-weight="700" fill="white">1</text>
  <text x="90" y="68" font-size="13" font-weight="700" fill="#1e40af">知识 Knowledge</text>
  <text x="90" y="86" font-size="11" fill="#475569">外部文档、领域知识、参考资料 · RAG + Agentic Search</text>
  <rect x="620" y="58" width="145" height="20" rx="4" fill="#dbeafe"/>
  <text x="692" y="73" text-anchor="middle" font-size="10" fill="#1e40af">→ ZhiXing search()</text>

  <!-- Layer 2 -->
  <rect x="40" y="108" width="740" height="56" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5" filter="url(#shL)"/>
  <rect x="40" y="108" width="40" height="56" rx="8" fill="#3b82f6"/>
  <rect x="68" y="108" width="2" height="56" fill="white"/>
  <text x="60" y="142" text-anchor="middle" font-size="16" font-weight="700" fill="white">2</text>
  <text x="90" y="130" font-size="13" font-weight="700" fill="#1e40af">记忆 Memory</text>
  <text x="90" y="148" font-size="11" fill="#475569">用户画像、事实偏好、情景记忆、Trait · 跨会话持久化</text>
  <rect x="600" y="120" width="165" height="20" rx="4" fill="#dbeafe"/>
  <text x="682" y="135" text-anchor="middle" font-size="10" fill="#1e40af">→ recall()/ingest()/digest()</text>

  <!-- Layer 3 -->
  <rect x="40" y="170" width="740" height="56" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,3" filter="url(#shL)"/>
  <rect x="40" y="170" width="40" height="56" rx="8" fill="#94a3b8"/>
  <rect x="68" y="170" width="2" height="56" fill="white"/>
  <text x="60" y="204" text-anchor="middle" font-size="16" font-weight="700" fill="white">3</text>
  <text x="90" y="192" font-size="13" font-weight="700" fill="#64748b">对话历史 History</text>
  <text x="90" y="210" font-size="11" fill="#94a3b8">当前会话原始消息 · 会话结束即消亡或压缩为记忆</text>
  <rect x="620" y="182" width="145" height="20" rx="4" fill="#f1f5f9"/>
  <text x="692" y="197" text-anchor="middle" font-size="10" fill="#94a3b8">Agent 平台原生管理</text>

  <!-- Layer 4 -->
  <rect x="40" y="232" width="740" height="56" rx="8" fill="white" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6,3" filter="url(#shL)"/>
  <rect x="40" y="232" width="40" height="56" rx="8" fill="#94a3b8"/>
  <rect x="68" y="232" width="2" height="56" fill="white"/>
  <text x="60" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="white">4</text>
  <text x="90" y="254" font-size="13" font-weight="700" fill="#64748b">上下文组装 Context Assembly</text>
  <text x="90" y="272" font-size="11" fill="#94a3b8">知识/记忆/历史的选择、排序、Token 预算分配</text>
  <rect x="620" y="244" width="145" height="20" rx="4" fill="#f1f5f9"/>
  <text x="692" y="259" text-anchor="middle" font-size="10" fill="#94a3b8">ContextEngine / L0L1L2</text>

  <!-- Layer 5 -->
  <rect x="40" y="294" width="740" height="56" rx="8" fill="white" stroke="#f97316" stroke-width="1.5" filter="url(#shL)"/>
  <rect x="40" y="294" width="40" height="56" rx="8" fill="#f97316"/>
  <rect x="68" y="294" width="2" height="56" fill="white"/>
  <text x="60" y="328" text-anchor="middle" font-size="16" font-weight="700" fill="white">5</text>
  <text x="90" y="316" font-size="13" font-weight="700" fill="#c2410c">轨迹 Trajectory</text>
  <text x="90" y="334" font-size="11" fill="#475569">完整任务执行记录 (状态, 动作, 观察, 奖励)* · 记忆的原材料</text>
  <rect x="620" y="306" width="145" height="20" rx="4" fill="#ffedd5"/>
  <text x="692" y="321" text-anchor="middle" font-size="10" fill="#c2410c">→ 数据飞轮核心资产</text>

  <!-- Layer 6 -->
  <rect x="40" y="356" width="740" height="56" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shL)"/>
  <rect x="40" y="356" width="40" height="56" rx="8" fill="#8b5cf6"/>
  <rect x="68" y="356" width="2" height="56" fill="white"/>
  <text x="60" y="390" text-anchor="middle" font-size="16" font-weight="700" fill="white">6</text>
  <text x="90" y="378" font-size="13" font-weight="700" fill="#5b21b6">运行环境 Environment</text>
  <text x="90" y="396" font-size="11" fill="#475569">应用数据库、代码沙箱、业务数据 · Agent 为应用创建后端</text>
  <rect x="620" y="368" width="145" height="20" rx="4" fill="#ede9fe"/>
  <text x="692" y="383" text-anchor="middle" font-size="10" fill="#5b21b6">→ dbay.cloud</text>

  <!-- Layer 7 -->
  <rect x="40" y="418" width="740" height="56" rx="8" fill="white" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shL)"/>
  <rect x="40" y="418" width="40" height="56" rx="8" fill="#8b5cf6"/>
  <rect x="68" y="418" width="2" height="56" fill="white"/>
  <text x="60" y="452" text-anchor="middle" font-size="16" font-weight="700" fill="white">7</text>
  <text x="90" y="440" font-size="13" font-weight="700" fill="#5b21b6">工作状态 State</text>
  <text x="90" y="458" font-size="11" fill="#475569">工作流检查点、中间结果、Agent 协作状态 · 分支试错+快照回滚</text>
  <rect x="620" y="430" width="145" height="20" rx="4" fill="#ede9fe"/>
  <text x="692" y="445" text-anchor="middle" font-size="10" fill="#5b21b6">→ dbay.cloud CoW 分支</text>

  <!-- Legend -->
  <rect x="200" y="490" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="220" y="502" font-size="10" fill="#475569">ZhiXing</text>
  <rect x="300" y="490" width="14" height="14" rx="3" fill="#f97316"/>
  <text x="320" y="502" font-size="10" fill="#475569">飞轮</text>
  <rect x="380" y="490" width="14" height="14" rx="3" fill="#8b5cf6"/>
  <text x="400" y="502" font-size="10" fill="#475569">dbay.cloud</text>
  <rect x="480" y="490" width="14" height="14" rx="3" fill="#94a3b8"/>
  <text x="500" y="502" font-size="10" fill="#475569">不做（Agent 原生）</text>
</svg>
