<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shM" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">记忆系统三层模型</text>

  <!-- Layer 1: Strategy -->
  <rect x="80" y="50" width="540" height="80" rx="12" fill="white" stroke="#f97316" stroke-width="2" filter="url(#shM)"/>
  <rect x="80" y="50" width="540" height="32" rx="12" fill="#fff7ed"/>
  <text x="350" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">记忆策略层 Memory Strategy</text>
  <text x="105" y="98" font-size="11" fill="#475569">提取策略</text>
  <text x="210" y="98" font-size="11" fill="#475569">遗忘策略</text>
  <text x="315" y="98" font-size="11" fill="#475569">反思策略</text>
  <text x="420" y="98" font-size="11" fill="#475569">压缩策略</text>
  <text x="105" y="118" font-size="10" fill="#f97316" font-weight="500">何时记、记什么、何时忘</text>

  <!-- Annotation 1 -->
  <rect x="630" y="70" width="60" height="40" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="660" y="88" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">必须</text>
  <text x="660" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">分场景</text>

  <!-- Arrow down -->
  <line x1="350" y1="130" x2="350" y2="150" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="344,148 350,158 356,148" fill="#94a3b8"/>

  <!-- Layer 2: Organization -->
  <rect x="80" y="162" width="540" height="80" rx="12" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shM)"/>
  <rect x="80" y="162" width="540" height="32" rx="12" fill="#eff6ff"/>
  <text x="350" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#1e40af">记忆组织层 Memory Organization</text>
  <text x="105" y="210" font-size="11" fill="#475569">类型系统 (fact/episode/trait)</text>
  <text x="340" y="210" font-size="11" fill="#475569">元数据 (时间/重要性/情感)</text>
  <text x="105" y="230" font-size="11" fill="#475569">关联 (图谱/Zettelkasten)</text>

  <!-- Annotation 2 -->
  <rect x="630" y="182" width="60" height="40" rx="6" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="660" y="200" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">部分</text>
  <text x="660" y="212" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">通用</text>

  <!-- Arrow down -->
  <line x1="350" y1="242" x2="350" y2="262" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="344,260 350,270 356,260" fill="#94a3b8"/>

  <!-- Layer 3: Storage -->
  <rect x="80" y="274" width="540" height="56" rx="12" fill="white" stroke="#22c55e" stroke-width="2" filter="url(#shM)"/>
  <rect x="80" y="274" width="540" height="32" rx="12" fill="#f0fdf4"/>
  <text x="350" y="296" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">底层存储层 Storage Engine</text>
  <text x="105" y="320" font-size="11" fill="#475569">向量存储</text>
  <text x="210" y="320" font-size="11" fill="#475569">图存储</text>
  <text x="290" y="320" font-size="11" fill="#475569">全文检索 BM25</text>
  <text x="440" y="320" font-size="11" fill="#475569">KV 存储</text>

  <!-- Annotation 3 -->
  <rect x="630" y="282" width="60" height="40" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="660" y="300" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">完全</text>
  <text x="660" y="312" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">通用</text>
</svg>
