<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ar1" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#3b82f6"/>
    </marker>
    <marker id="ar2" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#f97316"/>
    </marker>
    <filter id="sh2" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <text x="410" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">传统 RAG vs Agentic Search</text>

  <!-- Traditional RAG -->
  <rect x="30" y="50" width="760" height="120" rx="12" fill="white" stroke="#93c5fd" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="60" y="76" font-size="14" font-weight="700" fill="#1e40af">传统 RAG（单步管线）</text>
  <text x="680" y="76" font-size="11" fill="#22c55e" font-weight="500">快 · 便宜 · &lt;200ms</text>

  <!-- RAG flow -->
  <rect x="60" y="92" width="80" height="32" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="100" y="113" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">Query</text>
  <line x1="140" y1="108" x2="170" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ar1)"/>

  <rect x="172" y="92" width="80" height="32" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="212" y="113" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">Embed</text>
  <line x1="252" y1="108" x2="282" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ar1)"/>

  <rect x="284" y="92" width="110" height="32" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="339" y="113" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">向量搜索 Top-K</text>
  <line x1="394" y1="108" x2="424" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ar1)"/>

  <rect x="426" y="92" width="80" height="32" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="466" y="113" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">喂给 LLM</text>
  <line x1="506" y1="108" x2="536" y2="108" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ar1)"/>

  <rect x="538" y="92" width="70" height="32" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="573" y="113" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">回答</text>

  <!-- Limitations -->
  <text x="60" y="148" font-size="10" fill="#ef4444">&#x2717; 不能判断结果够不够</text>
  <text x="260" y="148" font-size="10" fill="#ef4444">&#x2717; 不能换数据源</text>
  <text x="450" y="148" font-size="10" fill="#ef4444">&#x2717; 不能分解复杂问题</text>

  <!-- Agentic Search -->
  <rect x="30" y="180" width="760" height="180" rx="12" fill="white" stroke="#fdba74" stroke-width="1.5" filter="url(#sh2)"/>
  <text x="60" y="206" font-size="14" font-weight="700" fill="#c2410c">Agentic Search（Agent 驱动多步检索）</text>
  <text x="680" y="206" font-size="11" fill="#f97316" font-weight="500">准 · 多源 · 1-5s</text>

  <!-- Agentic flow -->
  <rect x="60" y="220" width="80" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="100" y="241" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">Query</text>
  <line x1="140" y1="236" x2="170" y2="236" stroke="#f97316" stroke-width="1.5" marker-end="url(#ar2)"/>

  <rect x="172" y="220" width="100" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="222" y="241" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">Agent 规划</text>
  <line x1="272" y1="236" x2="302" y2="236" stroke="#f97316" stroke-width="1.5" marker-end="url(#ar2)"/>

  <!-- Multiple data sources -->
  <rect x="304" y="216" width="60" height="24" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="334" y="233" text-anchor="middle" font-size="9" font-weight="500" fill="#92400e">源 A</text>
  <rect x="304" y="244" width="60" height="24" rx="4" fill="#fef3c7" stroke="#fbbf24" stroke-width="1"/>
  <text x="334" y="261" text-anchor="middle" font-size="9" font-weight="500" fill="#92400e">源 B</text>

  <line x1="364" y1="236" x2="394" y2="236" stroke="#f97316" stroke-width="1.5" marker-end="url(#ar2)"/>

  <rect x="396" y="220" width="90" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="441" y="241" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">评估相关性</text>

  <!-- Decision diamond -->
  <polygon points="520,236 545,220 570,236 545,252" fill="#fff7ed" stroke="#f97316" stroke-width="1.5"/>
  <text x="545" y="240" text-anchor="middle" font-size="9" font-weight="600" fill="#c2410c">够?</text>

  <!-- Not enough loop -->
  <line x1="545" y1="252" x2="545" y2="280" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="480" y="280" width="130" height="28" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="545" y="299" text-anchor="middle" font-size="10" fill="#991b1b">改写查询 · 换源重试</text>
  <path d="M 480 294 Q 420 294 420 260 Q 420 236 396 236" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Enough path -->
  <line x1="570" y1="236" x2="600" y2="236" stroke="#f97316" stroke-width="1.5" marker-end="url(#ar2)"/>

  <rect x="602" y="220" width="70" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="637" y="241" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">自校验</text>
  <line x1="672" y1="236" x2="702" y2="236" stroke="#f97316" stroke-width="1.5" marker-end="url(#ar2)"/>

  <rect x="704" y="220" width="66" height="32" rx="6" fill="#fed7aa" stroke="#f97316" stroke-width="1.5"/>
  <text x="737" y="241" text-anchor="middle" font-size="11" font-weight="600" fill="#c2410c">回答</text>

  <!-- Advantages -->
  <text x="60" y="338" font-size="10" fill="#22c55e">&#x2713; 处理复杂/模糊问题</text>
  <text x="250" y="338" font-size="10" fill="#22c55e">&#x2713; 多数据源路由</text>
  <text x="430" y="338" font-size="10" fill="#22c55e">&#x2713; 自纠错重试</text>
  <text x="600" y="338" font-size="10" fill="#22c55e">&#x2713; 质量关卡</text>
</svg>
