<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shadowTp" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="18" font-weight="600" fill="#1e293b">三产品协同关系</text>

  <!-- Top: Users/Agents -->
  <rect x="250" y="50" width="300" height="40" rx="20" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="400" y="75" text-anchor="middle" font-size="13" font-weight="500" fill="#166534">用户 / Agent</text>

  <!-- Arrow down -->
  <line x1="400" y1="90" x2="400" y2="115" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="107" font-size="10" fill="#94a3b8">MCP / REST / SDK</text>

  <!-- Layer 1: Cloud -->
  <rect x="80" y="120" width="640" height="120" rx="14" fill="white" stroke="#f97316" stroke-width="2" filter="url(#shadowTp)"/>
  <rect x="80" y="120" width="640" height="36" rx="14" fill="#fff7ed"/>
  <rect x="80" y="142" width="640" height="2" fill="white"/>
  <text x="120" y="144" font-size="14" font-weight="700" fill="#c2410c">ZhiXing Cloud</text>
  <text x="380" y="144" font-size="12" fill="#ea580c">SaaS 入口 · 用户接触层</text>

  <!-- Cloud features -->
  <rect x="100" y="164" width="120" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="160" y="185" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">MCP Server</text>

  <rect x="230" y="164" width="120" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="290" y="185" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">OpenClaw 插件</text>

  <rect x="360" y="164" width="120" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="420" y="185" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">记忆可视化</text>

  <rect x="490" y="164" width="120" height="32" rx="6" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="550" y="185" text-anchor="middle" font-size="11" font-weight="500" fill="#c2410c">Agent-Extract Mode</text>

  <text x="400" y="224" text-anchor="middle" font-size="10" fill="#94a3b8">调用 SDK core.py 共享业务逻辑 — Cloud 是 SDK 的 SaaS 壳</text>

  <!-- Arrow down -->
  <line x1="400" y1="240" x2="400" y2="268" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Layer 2: SDK -->
  <rect x="80" y="272" width="640" height="110" rx="14" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadowTp)"/>
  <rect x="80" y="272" width="640" height="36" rx="14" fill="#eff6ff"/>
  <rect x="80" y="294" width="640" height="2" fill="white"/>
  <text x="120" y="296" font-size="14" font-weight="700" fill="#1e40af">ZhiXing SDK</text>
  <text x="340" y="296" font-size="12" fill="#3b82f6">核心智能引擎 · 所有能力的源头</text>

  <rect x="100" y="312" width="140" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="170" y="331" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">9 步 Trait 反思</text>

  <rect x="250" y="312" width="130" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="315" y="331" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">混合检索 RRF</text>

  <rect x="390" y="312" width="100" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="440" y="331" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">知识图谱</text>

  <rect x="500" y="312" width="100" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="550" y="331" text-anchor="middle" font-size="11" font-weight="500" fill="#1e40af">时间建模</text>

  <text x="400" y="370" text-anchor="middle" font-size="10" fill="#94a3b8">LoCoMo 82 分 · Python 3.12+ · MIT License · 可运行在任意 PostgreSQL</text>

  <!-- Arrow down -->
  <line x1="400" y1="382" x2="400" y2="410" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="480" y="400" font-size="10" fill="#94a3b8">PostgreSQL 协议</text>

  <!-- Layer 3: dbay.cloud -->
  <rect x="80" y="414" width="640" height="76" rx="14" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadowTp)"/>
  <rect x="80" y="414" width="640" height="36" rx="14" fill="#f5f3ff"/>
  <rect x="80" y="436" width="640" height="2" fill="white"/>
  <text x="120" y="438" font-size="14" font-weight="700" fill="#5b21b6">dbay.cloud</text>
  <text x="280" y="438" font-size="12" fill="#7c3aed">数据基础设施 · 已生产可用 (Stage 10e)</text>

  <rect x="100" y="450" width="160" height="28" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="180" y="469" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">Serverless PG 17</text>

  <rect x="270" y="450" width="120" height="28" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="330" y="469" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">CoW 分支</text>

  <rect x="400" y="450" width="140" height="28" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="470" y="469" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">Scale-to-zero</text>

  <rect x="550" y="450" width="150" height="28" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="625" y="469" text-anchor="middle" font-size="11" font-weight="500" fill="#5b21b6">Ray 集群 (规划中)</text>
</svg>
