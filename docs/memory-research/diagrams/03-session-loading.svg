<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="shS" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.05"/>
    </filter>
    <marker id="arS" markerWidth="7" markerHeight="5" refX="4" refY="5" orient="auto">
      <path d="M0,0 L4,5 L8,0" fill="#3b82f6"/>
    </marker>
  </defs>

  <text x="300" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">OpenClaw 会话加载流程</text>

  <!-- Step 1 -->
  <rect x="120" y="48" width="360" height="36" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shS)"/>
  <text x="300" y="71" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">新会话启动</text>
  <line x1="300" y1="84" x2="300" y2="98" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 2 -->
  <rect x="120" y="100" width="360" height="36" rx="8" fill="white" stroke="#93c5fd" stroke-width="1" filter="url(#shS)"/>
  <circle cx="145" cy="118" r="11" fill="#3b82f6"/>
  <text x="145" y="122" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>
  <text x="165" y="123" font-size="11" fill="#475569">读取 AGENTS.md（操作指令，最高优先级）</text>
  <line x1="300" y1="136" x2="300" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 3 -->
  <rect x="120" y="150" width="360" height="50" rx="8" fill="white" stroke="#93c5fd" stroke-width="1" filter="url(#shS)"/>
  <circle cx="145" cy="168" r="11" fill="#3b82f6"/>
  <text x="145" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>
  <text x="165" y="170" font-size="11" fill="#475569">按 boot 序列读取：</text>
  <text x="165" y="188" font-size="10" fill="#94a3b8">SOUL.md · USER.md · IDENTITY.md</text>
  <line x1="300" y1="200" x2="300" y2="212" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 4 -->
  <rect x="120" y="214" width="360" height="36" rx="8" fill="white" stroke="#93c5fd" stroke-width="1" filter="url(#shS)"/>
  <circle cx="145" cy="232" r="11" fill="#3b82f6"/>
  <text x="145" y="236" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
  <text x="165" y="237" font-size="11" fill="#475569">读取 memory/今天.md + memory/昨天.md</text>
  <line x1="300" y1="250" x2="300" y2="262" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 5 -->
  <rect x="120" y="264" width="360" height="36" rx="8" fill="white" stroke="#93c5fd" stroke-width="1" filter="url(#shS)"/>
  <circle cx="145" cy="282" r="11" fill="#3b82f6"/>
  <text x="145" y="286" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>
  <text x="165" y="287" font-size="11" fill="#475569">读取 MEMORY.md（长期记忆）</text>
  <line x1="300" y1="300" x2="300" y2="312" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Step 6 -->
  <rect x="120" y="314" width="360" height="36" rx="8" fill="white" stroke="#93c5fd" stroke-width="1" filter="url(#shS)"/>
  <circle cx="145" cy="332" r="11" fill="#3b82f6"/>
  <text x="145" y="336" text-anchor="middle" font-size="10" font-weight="700" fill="white">5</text>
  <text x="165" y="337" font-size="11" fill="#475569">memory-core 建立 SQLite 索引（后台）</text>
  <line x1="300" y1="350" x2="300" y2="362" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arS)"/>

  <!-- Session in progress -->
  <rect x="120" y="364" width="360" height="60" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shS)"/>
  <text x="300" y="386" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">会话进行中</text>
  <text x="145" y="408" font-size="10" fill="#475569">回忆 → memory_search · 新知识 → 写入今天.md · 整理 → MEMORY.md</text>
</svg>
