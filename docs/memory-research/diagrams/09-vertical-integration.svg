<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh9" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="ar9u" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <path d="M0,6 L4,0 L8,6" fill="#22c55e"/>
    </marker>
    <marker id="ar9d" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#8b5cf6"/>
    </marker>
  </defs>

  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">垂直整合分析：向上还是向下？</text>

  <!-- Agent Layer (top) -->
  <rect x="100" y="50" width="500" height="70" rx="12" fill="white" stroke="#86efac" stroke-width="2" filter="url(#sh9)"/>
  <rect x="100" y="50" width="500" height="32" rx="12" fill="#f0fdf4"/>
  <text x="350" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Agent 系统层</text>
  <text x="160" y="102" font-size="11" fill="#475569">OpenClaw</text>
  <text x="280" y="102" font-size="11" fill="#475569">OpenJiuWen</text>
  <text x="400" y="102" font-size="11" fill="#475569">Claude Code</text>
  <text x="510" y="102" font-size="11" fill="#475569">自建 Agent</text>

  <!-- Up arrow -->
  <line x1="280" y1="152" x2="280" y2="126" stroke="#22c55e" stroke-width="2" marker-end="url(#ar9u)"/>
  <rect x="170" y="140" width="190" height="24" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="265" y="157" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">向上：深度绑定 Agent</text>

  <!-- ZhiXing (middle) -->
  <rect x="100" y="170" width="500" height="60" rx="12" fill="#eef2ff" stroke="#818cf8" stroke-width="2.5" filter="url(#sh9)"/>
  <text x="350" y="198" text-anchor="middle" font-size="15" font-weight="800" fill="#4338ca">ZhiXing（记忆中间层）</text>
  <text x="350" y="218" text-anchor="middle" font-size="11" fill="#6366f1">ingest → 提取 → 存储 → 检索 → recall</text>

  <!-- Down arrow -->
  <line x1="420" y1="230" x2="420" y2="256" stroke="#8b5cf6" stroke-width="2" marker-end="url(#ar9d)"/>
  <rect x="340" y="238" width="190" height="24" rx="6" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="435" y="255" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">向下：深度绑定存储</text>

  <!-- Storage Layer (bottom) -->
  <rect x="100" y="268" width="500" height="70" rx="12" fill="white" stroke="#c4b5fd" stroke-width="2" filter="url(#sh9)"/>
  <rect x="100" y="268" width="500" height="32" rx="12" fill="#f5f3ff"/>
  <text x="350" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">存储系统层</text>
  <text x="160" y="320" font-size="11" fill="#475569">dbay.cloud</text>
  <text x="280" y="320" font-size="11" fill="#475569">PostgreSQL</text>
  <text x="400" y="320" font-size="11" fill="#475569">SQLite</text>
  <text x="510" y="320" font-size="11" fill="#475569">向量数据库</text>

  <!-- Verdict -->
  <rect x="50" y="148" width="16" height="16" rx="8" fill="#22c55e"/>
  <text x="74" y="161" font-size="10" font-weight="600" fill="#166534">先做 — 决定能不能活</text>

  <rect x="634" y="246" width="16" height="16" rx="8" fill="#8b5cf6"/>
  <text x="580" y="259" font-size="10" font-weight="600" fill="#5b21b6">后做 — 决定活得好不好</text>
</svg>
