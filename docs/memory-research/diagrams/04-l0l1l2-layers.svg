<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh4" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="ar4" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#6366f1"/>
    </marker>
  </defs>

  <text x="390" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">L0/L1/L2 三层上下文按需加载</text>
  <text x="390" y="48" text-anchor="middle" font-size="12" fill="#94a3b8">OpenViking 创新 — ZhiXing 将借鉴实现</text>

  <!-- Query -->
  <rect x="30" y="70" width="80" height="36" rx="8" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="70" y="93" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">Query</text>

  <line x1="110" y1="88" x2="145" y2="88" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ar4)"/>

  <!-- L0 -->
  <rect x="150" y="64" width="180" height="110" rx="10" fill="white" stroke="#86efac" stroke-width="2" filter="url(#sh4)"/>
  <rect x="150" y="64" width="180" height="30" rx="10" fill="#f0fdf4"/>
  <text x="240" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">L0 Abstract</text>
  <text x="170" y="108" font-size="11" fill="#475569">一句话摘要</text>
  <text x="170" y="126" font-size="11" fill="#64748b">~100 token/条</text>
  <rect x="165" y="140" width="150" height="22" rx="4" fill="#dcfce7"/>
  <text x="240" y="156" text-anchor="middle" font-size="10" font-weight="500" fill="#166534">快速过滤 · 粗筛</text>

  <line x1="330" y1="88" x2="380" y2="88" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ar4)"/>
  <text x="355" y="80" text-anchor="middle" font-size="9" fill="#6366f1">相关？</text>

  <!-- L1 -->
  <rect x="385" y="64" width="180" height="110" rx="10" fill="white" stroke="#93c5fd" stroke-width="2" filter="url(#sh4)"/>
  <rect x="385" y="64" width="180" height="30" rx="10" fill="#eff6ff"/>
  <text x="475" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">L1 Overview</text>
  <text x="405" y="108" font-size="11" fill="#475569">核心信息 + 使用场景</text>
  <text x="405" y="126" font-size="11" fill="#64748b">~2k token/条</text>
  <rect x="400" y="140" width="150" height="22" rx="4" fill="#dbeafe"/>
  <text x="475" y="156" text-anchor="middle" font-size="10" font-weight="500" fill="#1e40af">Agent 规划决策</text>

  <line x1="565" y1="88" x2="615" y2="88" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ar4)"/>
  <text x="590" y="80" text-anchor="middle" font-size="9" fill="#6366f1">需要？</text>

  <!-- L2 -->
  <rect x="620" y="64" width="140" height="110" rx="10" fill="white" stroke="#c084fc" stroke-width="2" filter="url(#sh4)"/>
  <rect x="620" y="64" width="140" height="30" rx="10" fill="#faf5ff"/>
  <text x="690" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">L2 Details</text>
  <text x="640" y="108" font-size="11" fill="#475569">完整原文</text>
  <text x="640" y="126" font-size="11" fill="#64748b">不限 token</text>
  <rect x="635" y="140" width="110" height="22" rx="4" fill="#f3e8ff"/>
  <text x="690" y="156" text-anchor="middle" font-size="10" font-weight="500" fill="#7e22ce">按需深度阅读</text>

  <!-- Comparison -->
  <rect x="60" y="200" width="300" height="100" rx="10" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="80" y="224" font-size="12" font-weight="600" fill="#991b1b">原生 OpenClaw 检索</text>
  <text x="80" y="246" font-size="11" fill="#7f1d1d">query → 向量搜索 → 返回完整内容 (L2)</text>
  <text x="80" y="264" font-size="11" fill="#7f1d1d">→ 全部塞进上下文</text>
  <rect x="80" y="274" width="240" height="18" rx="4" fill="#fee2e2"/>
  <text x="200" y="288" text-anchor="middle" font-size="10" fill="#991b1b">浪费 80%+ token 在不相关内容上</text>

  <rect x="420" y="200" width="300" height="100" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="440" y="224" font-size="12" font-weight="600" fill="#166534">ZhiXing L0/L1/L2 检索</text>
  <text x="440" y="246" font-size="11" fill="#14532d">query → L0 粗筛 → L1 精筛 → L2 按需</text>
  <text x="440" y="264" font-size="11" fill="#14532d">→ 只加载真正需要的内容</text>
  <rect x="440" y="274" width="240" height="18" rx="4" fill="#dcfce7"/>
  <text x="560" y="288" text-anchor="middle" font-size="10" fill="#166534">省 token 80%+，检索更精准</text>
</svg>
