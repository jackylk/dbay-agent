<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 440" font-family="'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <filter id="sh7" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <text x="370" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#1e293b">dbay.cloud + ZhiXing 覆盖 5/7 层</text>

  <!-- dbay.cloud section -->
  <rect x="40" y="50" width="660" height="160" rx="14" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#sh7)"/>
  <rect x="40" y="50" width="660" height="36" rx="14" fill="#f5f3ff"/>
  <text x="70" y="74" font-size="14" font-weight="700" fill="#5b21b6">dbay.cloud</text>
  <text x="210" y="74" font-size="11" fill="#7c3aed">Serverless Agent 数据平台 · PG + OBS + Lance + Ray</text>

  <rect x="60" y="96" width="300" height="40" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="70" y="112" font-size="11" font-weight="600" fill="#5b21b6">⑥ 运行环境</text>
  <text x="70" y="128" font-size="10" fill="#64748b">秒级建库 · 匿名创建 · scale-to-zero</text>

  <rect x="370" y="96" width="310" height="40" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="380" y="112" font-size="11" font-weight="600" fill="#5b21b6">⑦ 工作状态</text>
  <text x="380" y="128" font-size="10" fill="#64748b">检查点 · copy-on-write 分支 · 回滚</text>

  <rect x="60" y="144" width="620" height="40" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="70" y="160" font-size="11" font-weight="600" fill="#5b21b6">② 记忆存储（ZhiXing 持久层）</text>
  <text x="70" y="176" font-size="10" fill="#64748b">pgvector + pg_search + 每用户隔离</text>
  <text x="400" y="176" font-size="10" fill="#64748b">① 知识存储：chunk + 向量 + 图谱 → PG</text>

  <!-- ZhiXing section -->
  <rect x="40" y="220" width="660" height="120" rx="14" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#sh7)"/>
  <rect x="40" y="220" width="660" height="36" rx="14" fill="#eff6ff"/>
  <text x="70" y="244" font-size="14" font-weight="700" fill="#1e40af">ZhiXing</text>
  <text x="180" y="244" font-size="11" fill="#3b82f6">知识+记忆智能层 · 可运行在任意 PG 上</text>

  <rect x="60" y="266" width="200" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="70" y="282" font-size="11" font-weight="600" fill="#1e40af">① 知识</text>
  <text x="70" y="296" font-size="10" fill="#64748b">RAG + L0/L1/L2</text>

  <rect x="270" y="266" width="200" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="280" y="282" font-size="11" font-weight="600" fill="#1e40af">② 记忆智能</text>
  <text x="280" y="296" font-size="10" fill="#64748b">提取 · 反思 · Q-value · Trait</text>

  <rect x="480" y="266" width="200" height="36" rx="8" fill="#dbeafe" stroke="#93c5fd" stroke-width="1"/>
  <text x="490" y="282" font-size="11" font-weight="600" fill="#1e40af">⑤ 轨迹/飞轮</text>
  <text x="490" y="296" font-size="10" fill="#64748b">Q-value + 平台模型 + 导出</text>

  <!-- Not doing section -->
  <rect x="40" y="350" width="660" height="70" rx="14" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="70" y="378" font-size="12" font-weight="600" fill="#94a3b8">不做的层（留给 Agent 平台）</text>
  <text x="70" y="400" font-size="11" fill="#94a3b8">③ 对话历史：Agent 平台原生管理</text>
  <text x="370" y="400" font-size="11" fill="#94a3b8">④ 上下文组装：Agent 平台 ContextEngine</text>
</svg>
