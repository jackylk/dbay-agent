{{- if .Values.embedding.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-svc
  namespace: {{ .Release.Namespace }}
  labels:
    app: lakeon-embedding
spec:
  replicas: 1
  # Recreate (not RollingUpdate): single-replica + scarce GPU. Default
  # RollingUpdate's maxSurge requires a 2nd GPU during the rollout, which
  # this cluster doesn't have, leaving rollouts stuck (we burned 12 days
  # on this once already). Recreate trades 30-60s of downtime for actually
  # being able to upgrade.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lakeon-embedding
  template:
    metadata:
      labels:
        app: lakeon-embedding
    spec:
      nodeSelector:
        lakeon/role: gpu
      containers:
        - name: embedding
          image: {{ .Values.embedding.image }}
          {{- if .Values.embedding.gpu }}
          args:
            - {{ .Values.embedding.modelPath | default "/models/bge-m3" | quote }}
            - "--port"
            - "8000"
            - "--max-model-len"
            - {{ .Values.embedding.maxModelLen | default "512" | quote }}
            - "--gpu-memory-utilization"
            - {{ .Values.embedding.gpuMemoryUtilization | default "0.3" | quote }}
            - "--trust-remote-code"
            - "--served-model-name"
            - {{ .Values.embedding.model | default "BAAI/bge-m3" | quote }}
          {{- else }}
          env:
            - name: RERANK_ENABLED
              value: {{ .Values.embedding.rerankEnabled | default "false" | quote }}
          {{- end }}
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: {{ .Values.embedding.cpu | default "2" | quote }}
              memory: {{ .Values.embedding.memory | default "4Gi" | quote }}
              {{- if .Values.embedding.gpu }}
              nvidia.com/gpu: {{ .Values.embedding.gpu | quote }}
              {{- end }}
            limits:
              cpu: {{ .Values.embedding.cpu | default "2" | quote }}
              memory: {{ .Values.embedding.memory | default "4Gi" | quote }}
              {{- if .Values.embedding.gpu }}
              nvidia.com/gpu: {{ .Values.embedding.gpu | quote }}
              {{- end }}
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: model-cache
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-svc
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    app: lakeon-embedding
  ports:
    - port: 8000
      targetPort: 8000
{{- end }}
