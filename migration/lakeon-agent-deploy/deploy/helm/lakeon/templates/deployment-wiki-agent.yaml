{{- if .Values.wikiAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lakeon-wiki-agent
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: lakeon-wiki-agent
spec:
  replicas: {{ .Values.wikiAgent.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lakeon-wiki-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakeon-wiki-agent
        app.kubernetes.io/component: lakeon-wiki-agent
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: wiki-agent
          image: "{{ .Values.wikiAgent.image.repository }}:{{ .Values.wikiAgent.image.tag }}"
          imagePullPolicy: {{ .Values.wikiAgent.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          env:
            - name: LAKEON_API_URL
              value: {{ .Values.wikiAgent.lakeonApiUrl | default "http://lakeon-api.lakeon.svc:8080" | quote }}
            - name: LLM_BASE_URL
              value: {{ .Values.wikiAgent.llm.baseUrl | default "https://api.modelarts-maas.com/openai/v1" | quote }}
            - name: LLM_MODEL
              value: {{ .Values.wikiAgent.llm.model | default "deepseek-v3.2" | quote }}
            - name: MAX_TOOL_ROUNDS
              value: {{ .Values.wikiAgent.maxToolRounds | default 20 | quote }}
            - name: MAX_CONCURRENT_AGENTS
              value: {{ .Values.wikiAgent.maxConcurrentAgents | default 8 | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.wikiAgent.logLevel | default "INFO" | quote }}
            # Secrets
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-credentials
                  key: ai-api-key
            - name: WIKI_AGENT_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wiki-agent-secrets
                  key: internal-token
            - name: LAKEON_API_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: wiki-agent-secrets
                  key: internal-token
          resources:
            requests:
              cpu: {{ .Values.wikiAgent.resources.requests.cpu | default "200m" | quote }}
              memory: {{ .Values.wikiAgent.resources.requests.memory | default "512Mi" | quote }}
            limits:
              cpu: {{ .Values.wikiAgent.resources.limits.cpu | default "1000m" | quote }}
              memory: {{ .Values.wikiAgent.resources.limits.memory | default "2Gi" | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # NO liveness probe — agent loops take minutes; don't kill mid-run
---
apiVersion: v1
kind: Service
metadata:
  name: lakeon-wiki-agent
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lakeon.labels" . | nindent 4 }}
    app.kubernetes.io/component: lakeon-wiki-agent
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: lakeon-wiki-agent
  ports:
    - port: 8090
      targetPort: http
      protocol: TCP
      name: http
{{- end }}
