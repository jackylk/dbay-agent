# hermes_config/config.yaml
#
# NOTE: Adjusted from plan template after inspecting hermes source code.
#
# Deviations from the plan template:
#
# 1. `providers:` key field names differ:
#    - Plan had `api_key_env: "DEEPSEEK_API_KEY"` but hermes uses `key_env`
#      (resolve_user_provider, providers.py:496 reads `entry.get("key_env")`)
#    - Plan had `base_url: "${DEEPSEEK_BASE_URL}"` but hermes reads the literal
#      string value; the env-var expansion for deepseek is handled internally
#      via HERMES_OVERLAYS `base_url_env_var: "DEEPSEEK_BASE_URL"` (providers.py:112).
#      For a user-config override we supply the resolved URL directly as `api`.
#    - Plan had a `models:` list under the provider — hermes user-config does
#      NOT support a `models` list (resolve_user_provider ignores it).
#    - Note: `deepseek` is already a built-in provider in HERMES_OVERLAYS
#      (providers.py:111-114). The `providers:` section here overrides it with
#      a custom base URL so we can point at a HWC MaaS endpoint.
#
# 2. `model:` section:
#    - Plan had `model.provider` + `model.default`. Hermes reads the active
#      model from `--provider` / `--model` CLI flags or HERMES_DEFAULT_PROVIDER
#      / HERMES_DEFAULT_MODEL env vars at startup; there is no `model:` config
#      block. This section is left here as a documentation hint only — it is
#      silently ignored by hermes but serves as a reminder for the operator.
#
# 3. `gateway.platforms` list vs `platforms:` dict:
#    - Plan had `gateway.platforms: [feishu]`. In the real schema, `platforms:`
#      is a dict of platform_name -> PlatformConfig (config.py:379-382 / 539-556).
#    - Feishu is activated via env vars FEISHU_APP_ID + FEISHU_APP_SECRET
#      (_apply_env_overrides, config.py:1107-1132). The `platforms.feishu`
#      block here just sets `enabled: true` as an explicit declaration.
#
# 4. `feishu:` top-level section:
#    - Plan had fields like `app_id_env`, `app_secret_env`, etc. Hermes does
#      NOT have a `feishu:` top-level config section that maps env var names
#      (unlike slack/telegram which have per-key YAML overrides). All feishu
#      credentials come from env vars only (config.py:1107-1132).
#    - The env var for the user allowlist is FEISHU_ALLOWED_USERS (not
#      FEISHU_ALLOWED_OPEN_IDS as the plan had) — see gateway.py:3547,
#      feishu.py:1405.
#    - This section is removed from the YAML; the required env vars are
#      documented in verify_env.py instead.

# ---------------------------------------------------------------------------
# Provider override
# ---------------------------------------------------------------------------
# Override the built-in deepseek provider to point at the HWC MaaS endpoint.
# Set DEEPSEEK_API_KEY and DEEPSEEK_BASE_URL in the environment.
providers:
  deepseek:
    name: "Deepseek (HWC MaaS)"
    # `api` is the canonical field; hermes also accepts `url` or `base_url`
    # (resolve_user_provider, providers.py:494). We leave this blank here and
    # rely on the DEEPSEEK_BASE_URL env var being picked up via the built-in
    # overlay (providers.py:113: base_url_env_var: "DEEPSEEK_BASE_URL").
    # Uncomment and fill in if the env var approach is insufficient:
    # api: "https://maas-cn-southwest-2.myhuaweicloud.com/v1"
    key_env: "DEEPSEEK_API_KEY"
    transport: "openai_chat"

# ---------------------------------------------------------------------------
# Model hint (informational only — hermes ignores this block)
# ---------------------------------------------------------------------------
# To set the default at runtime use:
#   HERMES_DEFAULT_PROVIDER=deepseek HERMES_DEFAULT_MODEL=deepseek-chat
model:
  provider: "deepseek"
  default: "deepseek-chat"

# ---------------------------------------------------------------------------
# Platform: Feishu
# ---------------------------------------------------------------------------
# Feishu is activated by env vars FEISHU_APP_ID + FEISHU_APP_SECRET.
# The block below makes the intent explicit and enables the platform even
# if those vars haven't been applied yet (useful for config validation tools).
#
# All credentials are read from env vars (see verify_env.py for the list).
# Operator note: set FEISHU_ALLOWED_USERS to a comma-separated list of
# open_id values to restrict which users can interact with the bot.
platforms:
  feishu:
    enabled: true
    extra:
      connection_mode: "websocket"

# ---------------------------------------------------------------------------
# MCP servers (exposed to the hermes LLM as tools)
# ---------------------------------------------------------------------------
# dbay-sre-mcp is installed as a pip package with a `dbay-sre-mcp` entry point.
# It reads LOG_DB_DSN from env (already bridged from DBAY_LOGS_DSN in main.py).
# Starting it as a stdio subprocess gives the LLM access to log_search /
# log_trace / log_errors / log_stats tools — so Jacky can ask ad-hoc
# diagnostic questions like "今天 dbay.cloud 的冷启动 p95 是多少" and the
# agent can answer by querying dbay-logs directly.
mcp_servers:
  dbay_sre:
    command: "dbay-sre-mcp"
    args: []
    # Hermes MCP client filters env vars by default (_build_safe_env) — only
    # PATH/HOME/XDG_* pass through. We must explicitly declare LOG_DB_DSN here
    # so dbay-sre-mcp can find the Postgres. ${DBAY_LOGS_DSN} is resolved from
    # os.environ via hermes _interpolate_env_vars (mcp_tool.py:1591).
    env:
      LOG_DB_DSN: "${DBAY_LOGS_DSN}"
      LAKEON_ADMIN_TOKEN: "${LAKEON_ADMIN_TOKEN}"
      LAKEON_API_BASE_URL: "${LAKEON_API_BASE_URL}"
    timeout: 60
    connect_timeout: 30
