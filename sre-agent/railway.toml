# sre-agent/railway.toml
# OPERATOR NOTE: Set Railway dashboard `Service → Settings → Source → Root Directory`
# to `/` (not `/sre-agent`) so the build context includes `packages/`.

[build]
builder = "DOCKERFILE"
# Build context is repo root (rootDirectory=/) so workspace packages are visible.
dockerfilePath = "sre-agent/Dockerfile"
watchPatterns = [
  "sre-agent/**",
  "packages/**",
]

[deploy]
startCommand = "/app/entrypoint.sh"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

# No healthcheckPath — hermes gateway is a WebSocket client, not an HTTP server.
# Railway will consider the service healthy if the process stays alive.

# Volume must be provisioned in Railway dashboard (Service → Settings → Volumes,
# mount path /data/hermes). Without it, sessions lost on redeploy.
