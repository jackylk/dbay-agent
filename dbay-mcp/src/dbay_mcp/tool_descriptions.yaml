# DBay MCP — Descriptions & Agent Instructions
# ===============================================
# SRE/运维可直接编辑此文件来调整 AI agent 的行为。
# 修改后重启 MCP server 即可生效（或重新发布 pip 包）。
#
# 结构说明：
#   server.instructions — 全局指引，所有 MCP 客户端启动时加载
#   tools.<tool_name>.description — 单个工具的描述，告诉 agent 何时、如何调用
#   tools.<tool_name>.args.<arg_name> — 参数描述
#   agents.<agent_name> — `dbay setup <agent>` 注入到各 agent 指令文件的内容

server:
  instructions: |
    DBay provides persistent, cross-project memory and knowledge base for the user.
    IMPORTANT: When the user says '记住/remember/save this', you MUST call memory_ingest
    to store it in DBay — this is the user's long-term memory that persists across projects,
    sessions, and devices. Do NOT rely solely on local/built-in memory for such requests.
    When the user asks a question that might have been answered before, or asks about past
    decisions/conventions, call memory_recall first to check.

tools:
  # ---------------------------------------------------------------------------
  # Knowledge Base
  # ---------------------------------------------------------------------------
  knowledge_list:
    description: List all knowledge bases

  knowledge_search:
    description: Search a knowledge base using hybrid vector + BM25 search
    args:
      query: Search query in natural language
      kb_name_or_id: Knowledge base name or ID (optional, uses default from ~/.dbay/config.json)
      top_k: Number of results to return (default 5, max 50)

  knowledge_upload:
    description: Upload a local file to a knowledge base for processing
    args:
      file_path: Absolute path to the file to upload
      kb_name_or_id: Knowledge base name or ID (optional, uses default from ~/.dbay/config.json)
      tags: Optional list of tags for the document

  knowledge_upload_directory:
    description: Upload all supported files from a local directory to a knowledge base
    args:
      directory_path: Absolute path to the directory
      kb_name_or_id: Knowledge base name or ID (optional, uses default from ~/.dbay/config.json)
      recursive: Whether to scan subdirectories (default True)
      tags: Optional tags to apply to all uploaded documents

  # ---------------------------------------------------------------------------
  # Memory
  # ---------------------------------------------------------------------------
  memory_recall:
    description: |
      Search the user's long-term memory for past decisions, rejections, conventions, facts, and experiences.
      MUST be called when the user asks about something that might have been discussed before
      (e.g. 'what did we decide about X', 'how did we solve Y', 'what's my API key for Z').
      Also call proactively at the start of a task to check for relevant context, conventions, or past decisions.
    args:
      query: Natural language query (e.g. "why did we choose asyncpg", "naming conventions")
      memory_types: "Optional filter \u2014 any of: fact, episode, procedural, decision, rejection, convention"
      top_k: Number of results (default 10)
      memory_base: "DO NOT set this parameter unless the user explicitly asks to use a different memory base. The server auto-detects the user's default memory base from ~/.dbay/config.json."

  memory_ingest:
    description: |
      Save a persistent memory to the user's cross-project long-term memory.
      MUST be called when the user says '记住/remember/save this'.
      Also call proactively when you discover important information worth preserving.
      You MUST choose the correct memory_type:
      - fact: credentials, preferences, project info, technical specs (e.g. 'PyPI token is pypi-xxx', 'user prefers dark mode')
      - decision: choices made with rationale (e.g. 'chose PostgreSQL over MySQL because of pgvector support')
      - rejection: approaches explicitly rejected and why (e.g. 'don't use mocks in integration tests — burned by mock/prod divergence')
      - convention: team/project conventions, naming rules, workflow patterns (e.g. 'always use deploy.sh, never manual helm upgrade')
      - procedural: step-by-step procedures, deployment steps, setup guides
      - episode: notable incidents, debugging stories, production outages

      Tips: extract MULTIPLE memories from a single user message when appropriate.
      For example, 'we chose X because Y, and rejected Z because W' should produce
      both a decision memory and a rejection memory.
      Set importance >= 0.8 for credentials, critical decisions, and painful lessons.
    args:
      content: "The memory content \u2014 concise, structured, self-contained"
      memory_type: "REQUIRED. One of: fact, decision, rejection, convention, procedural, episode"
      importance: 0.0-1.0. Use 0.8+ for credentials, critical decisions, painful lessons
      source: Client identifier (default "claude-code")
      memory_base: "DO NOT set this parameter unless the user explicitly asks to use a different memory base. The server auto-detects the user's default memory base from ~/.dbay/config.json."

  memory_ingest_extracted:
    description: |
      Store pre-extracted memories.
      Call this after memory_ingest returns an extraction prompt and you have executed it.
    args:
      message_id: The message_id returned by memory_ingest
      extracted_data: "JSON string with extracted memories, e.g.: {\"facts\": [...], \"decisions\": [{\"content\": \"...\", \"rationale\": \"...\"}]}"
      memory_base: "DO NOT set this parameter unless the user explicitly asks to use a different memory base."

  memory_list:
    description: Browse memories in a memory base, optionally filtered by type
    args:
      memory_base: "DO NOT set this parameter unless the user explicitly asks to use a different memory base. The server auto-detects the default."
      memory_type: "Optional filter \u2014 one of: fact, episode, procedural, decision, rejection, convention"
      limit: Max number of memories to return (default 20)

  memory_delete:
    description: Delete a specific memory by ID
    args:
      memory_id: The ID of the memory to delete
      memory_base: "DO NOT set this parameter unless the user explicitly asks to use a different memory base. The server auto-detects the default."

  # ---------------------------------------------------------------------------
  # Wiki
  # ---------------------------------------------------------------------------
  wiki_list_pages:
    description: |
      List all wiki pages in a knowledge base with their title, filename, and one-line summary.
      Call this before creating a new wiki page to avoid duplicates. If kb_name_or_id is omitted,
      uses the user's current default KB.
    args:
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)

  wiki_read_page:
    description: |
      Read the full markdown content of a single wiki page by title. Use this when deciding whether
      to update or create a page during wiki ingestion.
    args:
      title: Wiki page title (required)
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)

  wiki_search_pages:
    description: |
      Keyword-search wiki pages by title and summary. Returns top_k matches with scores.
      Use to find relevant existing pages before creating a new one.
    args:
      query: Search query in natural language (required)
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)
      top_k: Number of results to return (default 5)

  wiki_get_schema:
    description: |
      Read the /schema.md document of a KB — the Karpathy-style schema that describes how the wiki
      should be maintained. Read this at the start of every ingest/curate/lint session to understand
      the KB's scope, page budget, and conventions.
    args:
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)

  wiki_ingest:
    description: |
      Trigger the wiki agent to integrate a source document into the KB wiki. The agent runs
      asynchronously; this tool returns a task_id immediately. Poll wiki_task_status to watch
      progress. Requires the document to already be uploaded to the KB via knowledge_upload.
    args:
      document_id: ID of the document to ingest into the wiki (required)
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)

  wiki_curate:
    description: |
      Trigger the wiki curate agent, which merges duplicate pages, removes generic content,
      and reorganizes the wiki. Returns task_id. Use when the wiki has grown bloated.
    args:
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)

  wiki_lint:
    description: |
      Trigger the wiki lint agent, which finds dead links, orphan pages, format errors,
      and proposes fixes. Returns task_id.
    args:
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)

  wiki_task_status:
    description: |
      Query the status of a wiki agent task (from wiki_ingest/curate/lint). Returns
      status=running|completed|error and any result or error details.
    args:
      task_id: Task ID returned by wiki_ingest/wiki_curate/wiki_lint (required)
      kb_name_or_id: Knowledge base name or ID (optional, uses default if omitted)

# ---------------------------------------------------------------------------
# Agent instruction injection (`dbay setup <agent>`)
# ---------------------------------------------------------------------------
# Each agent entry defines:
#   file — the instruction file path (~ will be expanded)
#   instruction — the text to append
#   marker — unique string to detect if already injected (prevents duplicates)
#
# SRE 可在此统一维护注入到各 agent 的指令内容。
# Console 接入页面也可以直接展示这些内容给用户复制。

agents:
  claude-code:
    file: "~/.claude/CLAUDE.md"
    marker: "<!-- dbay-memory -->"
    instruction: |
      <!-- dbay-memory -->
      ## DBay Memory
      When the user says "记住/remember", call dbay MCP `memory_ingest` to store it in the user's long-term memory (persists across projects and sessions). When the user asks about past decisions or context, call `memory_recall` first.

  gemini:
    file: "~/.gemini/GEMINI.md"
    marker: "<!-- dbay-memory -->"
    instruction: |
      <!-- dbay-memory -->
      ## DBay Memory
      When the user says "记住/remember", call dbay MCP `memory_ingest` to store it in the user's long-term memory (persists across projects and sessions). When the user asks about past decisions or context, call `memory_recall` first.

  cursor:
    file: "~/.cursor/rules/dbay.mdc"
    marker: "dbay-memory"
    instruction: |
      ---
      description: DBay memory integration
      globs:
      alwaysApply: true
      ---
      When the user says "记住/remember", call dbay MCP `memory_ingest` to store it in the user's long-term memory (persists across projects and sessions). When the user asks about past decisions or context, call `memory_recall` first.

  windsurf:
    file: "~/.windsurf/rules/dbay.md"
    marker: "<!-- dbay-memory -->"
    instruction: |
      <!-- dbay-memory -->
      ## DBay Memory
      When the user says "记住/remember", call dbay MCP `memory_ingest` to store it in the user's long-term memory (persists across projects and sessions). When the user asks about past decisions or context, call `memory_recall` first.
