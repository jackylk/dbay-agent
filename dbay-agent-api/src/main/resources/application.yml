server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

spring:
  datasource:
    url: ${DBAY_AGENT_DB_URL:jdbc:h2:file:/tmp/dbay-agent/agent-state;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE}
    username: ${DBAY_AGENT_DB_USER:sa}
    password: ${DBAY_AGENT_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${DBAY_AGENT_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

lakebase:
  api-base-url: ${LAKEBASE_API_BASE_URL:https://api.dbay.cloud:8443/api/v1}
  service-token: ${LAKEBASE_SERVICE_TOKEN:}

dbay-agent:
  connector:
    secret-key: ${DBAY_AGENT_CONNECTOR_SECRET_KEY:test-key-1234567890abcdef1234567}
  workloads:
    cluster-owner: ${DBAY_AGENT_WORKLOAD_CLUSTER_OWNER:dbay-agent}
    cluster-name: ${DBAY_AGENT_WORKLOAD_CLUSTER_NAME:dbay-agent-cce}
    namespace: ${DBAY_AGENT_WORKLOAD_NAMESPACE:dbay-agent-workers}
    backend: ${DBAY_AGENT_WORKLOAD_BACKEND:CCI}
