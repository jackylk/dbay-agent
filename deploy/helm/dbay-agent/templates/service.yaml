apiVersion: v1
kind: Service
metadata:
  name: {{ include "dbay-agent.fullname" . }}
  labels:
    {{- include "dbay-agent.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "dbay-agent.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
