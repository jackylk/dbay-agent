apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dbay-agent.fullname" . }}
  labels:
    {{- include "dbay-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "dbay-agent.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "dbay-agent.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dbay-agent-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - configMapRef:
                name: {{ include "dbay-agent.fullname" . }}-config
          {{- if or .Values.lakebase.serviceTokenSecret.enabled .Values.database.password }}
          env:
            {{- if .Values.database.password }}
            - name: DBAY_AGENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "dbay-agent.fullname" . }}-secrets
                  key: database-password
            {{- end }}
            {{- if .Values.lakebase.serviceTokenSecret.enabled }}
            - name: LAKEBASE_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.lakebase.serviceTokenSecret.name }}
                  key: {{ .Values.lakebase.serviceTokenSecret.key }}
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
